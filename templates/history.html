<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Visit History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-950 text-slate-100">
    <div class="min-h-screen">
      <!-- Header -->
      <div class="border-b border-slate-800">
        <div
          class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between"
        >
          <div>
            <div class="text-xl font-semibold">Visit History</div>
            <div class="text-slate-400 text-sm">Location-based attendance tracking</div>
          </div>
          <div class="flex gap-2">
            <button
              id="clearDataBtn"
              onclick="clearAllData()"
              class="rounded-lg bg-red-600 hover:bg-red-500 px-3 py-2 text-sm font-medium"
            >
              Clear Data
            </button>
            <a
              href="/"
              class="rounded-lg bg-slate-800 hover:bg-slate-700 px-3 py-2 text-sm"
            >
              Dashboard
            </a>
          </div>
        </div>
      </div>

      <div class="mx-auto max-w-6xl px-4 py-6">
        <!-- Tab bar -->
        <div class="flex gap-1 mb-6 border-b border-slate-800">
          <button
            class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-emerald-500 text-emerald-400"
            data-tab="daily"
          >
            Daily Summary
          </button>
          <button
            class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200"
            data-tab="person"
          >
            Per Person
          </button>
          <button
            class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200"
            data-tab="location"
          >
            Per Location
          </button>
        </div>

        <!-- Daily Summary Tab -->
        <div id="tab-daily" class="tab-content">
          <div class="flex items-center gap-3 mb-4">
            <label class="text-sm text-slate-400">Date:</label>
            <input
              id="dailyDate"
              type="date"
              class="rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-sm"
            />
            <button
              id="dailyLoadBtn"
              class="rounded-lg bg-emerald-600 hover:bg-emerald-500 px-3 py-2 text-sm font-medium"
            >
              Load
            </button>
            <div id="dailyMsg" class="text-xs text-slate-400"></div>
          </div>

          <!-- Person totals -->
          <div id="dailyTotals" class="mb-4"></div>

          <!-- Visits table -->
          <div class="rounded-xl border border-slate-800 bg-slate-900 overflow-hidden">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-slate-800 text-slate-400 text-xs">
                  <th class="px-4 py-3 text-left">Photo</th>
                  <th class="px-4 py-3 text-left">Person</th>
                  <th class="px-4 py-3 text-left">Location</th>
                  <th class="px-4 py-3 text-left">Arrived</th>
                  <th class="px-4 py-3 text-left">Left</th>
                  <th class="px-4 py-3 text-left">Duration</th>
                  <th class="px-4 py-3 text-left">Status</th>
                </tr>
              </thead>
              <tbody id="dailyTableBody">
                <tr>
                  <td colspan="7" class="px-4 py-6 text-center text-slate-500">
                    Select a date and click Load
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Per Person Tab -->
        <div id="tab-person" class="tab-content hidden">
          <div class="flex items-center gap-3 mb-4 flex-wrap">
            <label class="text-sm text-slate-400">Person:</label>
            <select
              id="personSelect"
              class="rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-sm min-w-48"
            >
              <option value="">Select...</option>
            </select>
            <label class="text-sm text-slate-400 ml-2">From:</label>
            <input
              id="personFrom"
              type="date"
              class="rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-sm"
            />
            <label class="text-sm text-slate-400">To:</label>
            <input
              id="personTo"
              type="date"
              class="rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-sm"
            />
            <button
              id="personLoadBtn"
              class="rounded-lg bg-emerald-600 hover:bg-emerald-500 px-3 py-2 text-sm font-medium"
            >
              Load
            </button>
          </div>

          <div id="personSummary" class="mb-4"></div>

          <div class="rounded-xl border border-slate-800 bg-slate-900 overflow-hidden">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-slate-800 text-slate-400 text-xs">
                  <th class="px-4 py-3 text-left">Photo</th>
                  <th class="px-4 py-3 text-left">Date</th>
                  <th class="px-4 py-3 text-left">Location</th>
                  <th class="px-4 py-3 text-left">Arrived</th>
                  <th class="px-4 py-3 text-left">Left</th>
                  <th class="px-4 py-3 text-left">Duration</th>
                  <th class="px-4 py-3 text-left">Status</th>
                </tr>
              </thead>
              <tbody id="personTableBody">
                <tr>
                  <td colspan="7" class="px-4 py-6 text-center text-slate-500">
                    Select a person and click Load
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Per Location Tab -->
        <div id="tab-location" class="tab-content hidden">
          <div class="flex items-center gap-3 mb-4 flex-wrap">
            <label class="text-sm text-slate-400">Location:</label>
            <select
              id="locationSelect"
              class="rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-sm min-w-48"
            >
              <option value="">Select...</option>
            </select>
            <label class="text-sm text-slate-400 ml-2">From:</label>
            <input
              id="locationFrom"
              type="date"
              class="rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-sm"
            />
            <label class="text-sm text-slate-400">To:</label>
            <input
              id="locationTo"
              type="date"
              class="rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-sm"
            />
            <button
              id="locationLoadBtn"
              class="rounded-lg bg-emerald-600 hover:bg-emerald-500 px-3 py-2 text-sm font-medium"
            >
              Load
            </button>
          </div>

          <div class="rounded-xl border border-slate-800 bg-slate-900 overflow-hidden">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-slate-800 text-slate-400 text-xs">
                  <th class="px-4 py-3 text-left">Photo</th>
                  <th class="px-4 py-3 text-left">Person</th>
                  <th class="px-4 py-3 text-left">Date</th>
                  <th class="px-4 py-3 text-left">Arrived</th>
                  <th class="px-4 py-3 text-left">Left</th>
                  <th class="px-4 py-3 text-left">Duration</th>
                  <th class="px-4 py-3 text-left">Status</th>
                </tr>
              </thead>
              <tbody id="locationTableBody">
                <tr>
                  <td colspan="7" class="px-4 py-6 text-center text-slate-500">
                    Select a location and click Load
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      // --- Tabs ---
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach((b) => {
            b.classList.remove("border-emerald-500", "text-emerald-400");
            b.classList.add("border-transparent", "text-slate-400");
          });
          btn.classList.remove("border-transparent", "text-slate-400");
          btn.classList.add("border-emerald-500", "text-emerald-400");

          document.querySelectorAll(".tab-content").forEach((c) => c.classList.add("hidden"));
          const target = document.getElementById("tab-" + btn.dataset.tab);
          if (target) target.classList.remove("hidden");
        });
      });

      // --- Helpers ---
      function fmtTime(iso) {
        if (!iso) return "--";
        try {
          return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        } catch { return "--"; }
      }

      function fmtDate(iso) {
        if (!iso) return "--";
        try {
          return new Date(iso).toLocaleDateString();
        } catch { return "--"; }
      }

      function statusBadge(v) {
        if (!v.ended) {
          return `<span class="px-2 py-0.5 rounded text-xs bg-emerald-900 text-emerald-300">Active</span>`;
        }
        return `<span class="px-2 py-0.5 rounded text-xs bg-slate-800 text-slate-400">Ended</span>`;
      }

      function visitRow(v, opts = {}) {
        const showDate = opts.showDate || false;
        const showPerson = opts.showPerson !== false;
        const showLocation = opts.showLocation !== false;
        const photo = v.screenshot_url
          ? `<a href="${v.screenshot_url}" target="_blank"><img src="${v.screenshot_url}" class="w-20 h-14 rounded object-cover border border-slate-700 hover:border-emerald-500 transition-colors"></a>`
          : `<span class="text-slate-600 text-xs">--</span>`;
        let cols = `<td class="px-4 py-2">${photo}</td>`;
        if (showPerson) cols += `<td class="px-4 py-2 font-medium">${v.person_name}</td>`;
        if (showLocation) cols += `<td class="px-4 py-2 text-slate-300">${v.location_name}</td>`;
        if (showDate) cols += `<td class="px-4 py-2 text-slate-400">${fmtDate(v.first_seen)}</td>`;
        cols += `<td class="px-4 py-2 text-slate-300">${fmtTime(v.first_seen)}</td>`;
        cols += `<td class="px-4 py-2 text-slate-300">${fmtTime(v.last_seen)}</td>`;
        cols += `<td class="px-4 py-2 text-slate-300">${v.duration_fmt}</td>`;
        cols += `<td class="px-4 py-2">${statusBadge(v)}</td>`;
        return `<tr class="border-b border-slate-800/50 hover:bg-slate-800/30">${cols}</tr>`;
      }

      function today() {
        return new Date().toISOString().split("T")[0];
      }

      // --- Daily Summary ---
      const dailyDate = document.getElementById("dailyDate");
      const dailyLoadBtn = document.getElementById("dailyLoadBtn");
      const dailyMsg = document.getElementById("dailyMsg");
      const dailyTableBody = document.getElementById("dailyTableBody");
      const dailyTotals = document.getElementById("dailyTotals");

      dailyDate.value = today();

      dailyLoadBtn.addEventListener("click", async () => {
        const d = dailyDate.value;
        if (!d) return;
        dailyMsg.textContent = "Loading...";
        try {
          const r = await fetch(`/api/history/daily?date=${d}`);
          const j = await r.json();
          if (!j.ok) {
            dailyMsg.textContent = j.error || "Error";
            return;
          }
          dailyMsg.textContent = `${j.visits.length} visit(s)`;
          dailyTableBody.innerHTML = j.visits.length
            ? j.visits.map((v) => visitRow(v)).join("")
            : `<tr><td colspan="7" class="px-4 py-6 text-center text-slate-500">No visits on this date</td></tr>`;

          // Totals
          const totals = j.person_totals || {};
          const names = Object.keys(totals).sort();
          if (names.length) {
            dailyTotals.innerHTML = `
              <div class="flex flex-wrap gap-2">
                ${names.map((n) => `
                  <div class="rounded-lg border border-slate-800 bg-slate-900 px-3 py-2">
                    <div class="text-sm font-medium">${n}</div>
                    <div class="text-xs text-slate-400">Total: ${totals[n].total_fmt}</div>
                  </div>
                `).join("")}
              </div>
            `;
          } else {
            dailyTotals.innerHTML = "";
          }
        } catch (e) {
          dailyMsg.textContent = String(e);
        }
      });

      // --- Per Person ---
      const personSelect = document.getElementById("personSelect");
      const personFrom = document.getElementById("personFrom");
      const personTo = document.getElementById("personTo");
      const personLoadBtn = document.getElementById("personLoadBtn");
      const personTableBody = document.getElementById("personTableBody");
      const personSummary = document.getElementById("personSummary");

      async function loadPersons() {
        try {
          const r = await fetch("/api/history/persons");
          const j = await r.json();
          if (j.ok && j.persons) {
            personSelect.innerHTML =
              `<option value="">Select...</option>` +
              j.persons.map((n) => `<option value="${n}">${n}</option>`).join("");
          }
        } catch {}
      }

      personLoadBtn.addEventListener("click", async () => {
        const name = personSelect.value;
        if (!name) return;
        let url = `/api/history/person/${encodeURIComponent(name)}`;
        const params = [];
        if (personFrom.value) params.push(`from=${personFrom.value}`);
        if (personTo.value) params.push(`to=${personTo.value}`);
        if (params.length) url += "?" + params.join("&");

        try {
          const r = await fetch(url);
          const j = await r.json();
          if (!j.ok) return;
          personTableBody.innerHTML = j.visits.length
            ? j.visits.map((v) => visitRow(v, { showDate: true, showPerson: false })).join("")
            : `<tr><td colspan="7" class="px-4 py-6 text-center text-slate-500">No visits found</td></tr>`;

          personSummary.innerHTML = `
            <div class="rounded-lg border border-slate-800 bg-slate-900 px-4 py-3 inline-block">
              <span class="text-sm font-medium">${name}</span>
              <span class="text-xs text-slate-400 ml-2">Total: ${j.total_fmt} across ${j.visits.length} visit(s)</span>
            </div>
          `;
        } catch {}
      });

      // --- Per Location ---
      const locationSelect = document.getElementById("locationSelect");
      const locationFrom = document.getElementById("locationFrom");
      const locationTo = document.getElementById("locationTo");
      const locationLoadBtn = document.getElementById("locationLoadBtn");
      const locationTableBody = document.getElementById("locationTableBody");

      async function loadLocations() {
        try {
          const r = await fetch("/api/history/locations");
          const j = await r.json();
          if (j.ok && j.locations) {
            locationSelect.innerHTML =
              `<option value="">Select...</option>` +
              j.locations
                .map((l) => `<option value="${l.id}">${l.name} (${l.camera_source})</option>`)
                .join("");
          }
        } catch {}
      }

      locationLoadBtn.addEventListener("click", async () => {
        const locId = locationSelect.value;
        if (!locId) return;
        let url = `/api/history/location/${locId}`;
        const params = [];
        if (locationFrom.value) params.push(`from=${locationFrom.value}`);
        if (locationTo.value) params.push(`to=${locationTo.value}`);
        if (params.length) url += "?" + params.join("&");

        try {
          const r = await fetch(url);
          const j = await r.json();
          if (!j.ok) return;
          locationTableBody.innerHTML = j.visits.length
            ? j.visits.map((v) => visitRow(v, { showDate: true, showLocation: false })).join("")
            : `<tr><td colspan="7" class="px-4 py-6 text-center text-slate-500">No visits found</td></tr>`;
        } catch {}
      });

      // --- Clear data ---
      async function clearAllData() {
        if (!confirm("Delete ALL visits and sessions? This cannot be undone.")) return;
        const btn = document.getElementById("clearDataBtn");
        btn.disabled = true;
        btn.textContent = "Clearing...";
        try {
          const r = await fetch("/api/history/clear", { method: "POST" });
          const j = await r.json();
          if (j.ok) {
            btn.textContent = "Cleared!";
            // Refresh all tabs
            dailyLoadBtn.click();
            loadPersons();
            loadLocations();
            setTimeout(() => { btn.textContent = "Clear Data"; btn.disabled = false; }, 1500);
          } else {
            alert("Error: " + (j.error || "unknown"));
            btn.textContent = "Clear Data";
            btn.disabled = false;
          }
        } catch (e) {
          alert("Failed: " + e);
          btn.textContent = "Clear Data";
          btn.disabled = false;
        }
      }

      // --- Init ---
      loadPersons();
      loadLocations();
    </script>
  </body>
</html>
