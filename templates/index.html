<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Face Recognition Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-950 text-slate-100">
    <div class="min-h-screen">
      <!-- Header -->
      <div class="border-b border-slate-800">
        <div
          class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between"
        >
          <div>
            <div class="text-xl font-semibold">Face Recognition</div>
            <div class="text-slate-400 text-sm">Flask dashboard</div>
          </div>

          <div class="flex gap-2">
            <a
              href="/history"
              class="rounded-lg bg-slate-800 hover:bg-slate-700 px-3 py-2 text-sm"
            >
              History
            </a>
            <a
              href="/people"
              class="rounded-lg bg-slate-800 hover:bg-slate-700 px-3 py-2 text-sm"
            >
              People
            </a>
            <a
              href="/test"
              class="rounded-lg bg-slate-800 hover:bg-slate-700 px-3 py-2 text-sm"
            >
              Test Video
            </a>
            <button
              id="reloadBtn"
              class="rounded-lg bg-slate-800 hover:bg-slate-700 px-3 py-2 text-sm"
            >
              Reload faces
            </button>
          </div>
        </div>
      </div>

      <div
        class="mx-auto max-w-6xl px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6"
      >
        <!-- Video -->
        <div class="lg:col-span-3">
          <div
            class="rounded-xl border border-slate-800 bg-slate-900"
          >
            <div
              class="px-4 py-3 border-b border-slate-800 flex items-center justify-between rounded-t-xl"
            >
              <div class="font-medium">Live feed</div>
              <div class="text-xs text-slate-400" id="statusText">—</div>
              <div class="flex flex-wrap items-center gap-2">
                <!-- Single / Multi cam mode selector -->
                <div class="relative" id="camModeGroup">
                  <div class="flex rounded-lg overflow-hidden border border-slate-700">
                    <!-- Single camera button -->
                    <button id="singleCamBtn" type="button" title="Single camera"
                      class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium transition-colors bg-slate-800 hover:bg-slate-700">
                      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <circle cx="12" cy="12" r="3"/>
                      </svg>
                      <span class="text-xs">Single</span>
                    </button>
                    <!-- Multi camera button -->
                    <button id="multiCamBtn" type="button" title="Multi camera grid"
                      class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium transition-colors bg-slate-800 hover:bg-slate-700 border-l border-slate-700">
                      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="9" height="9" rx="1"/>
                        <rect x="13" y="2" width="9" height="9" rx="1"/>
                        <rect x="2" y="13" width="9" height="9" rx="1"/>
                        <rect x="13" y="13" width="9" height="9" rx="1"/>
                      </svg>
                      <span class="text-xs">Multi</span>
                    </button>
                  </div>
                  <!-- Single camera dropdown -->
                  <div id="singleCamDropdown"
                    class="hidden absolute top-full left-0 mt-1 z-50 min-w-52 rounded-lg border border-slate-700 bg-slate-900 shadow-xl overflow-hidden">
                    <div id="singleCamList" class="max-h-60 overflow-y-auto"></div>
                  </div>
                  <!-- Multi camera dropdown -->
                  <div id="multiCamDropdown"
                    class="hidden absolute top-full left-0 mt-1 z-50 min-w-52 rounded-lg border border-slate-700 bg-slate-900 shadow-xl overflow-hidden">
                    <div id="multiCamList" class="max-h-60 overflow-y-auto"></div>
                  </div>
                </div>
                <button
                  id="startBtn"
                  class="rounded-lg bg-emerald-600 hover:bg-emerald-500 px-3 py-2 text-sm font-medium"
                >
                  Start
                </button>
                <button
                  id="stopBtn"
                  class="rounded-lg bg-rose-600 hover:bg-rose-500 px-3 py-2 text-sm font-medium"
                >
                  Stop
                </button>
              </div>
            </div>
            <div class="p-3 relative">
              <div id="cameraMsg" class="mb-2 text-xs text-slate-400"></div>
              <img id="videoFeed" class="w-full ..." src="" alt="video" />

              <!-- QR prompt overlay -->
              <!-- <div
                id="qrPrompt"
                class="hidden absolute inset-3 rounded-xl border border-amber-700 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-6"
              >
                <div class="max-w-md text-center space-y-2">
                  <div class="text-lg font-semibold text-amber-200">Show QR code</div>
                  <div class="text-sm text-slate-200">
                    Face not recognized. Hold your QR code in front of the camera to mark attendance.
                  </div>
                  <div class="text-xs text-slate-400">
                    Keep it steady and fill the center of the frame.
                  </div>
                </div>
              </div> -->
            </div>
          </div>

          <!-- Grid Configurator Panel (shown when a grid mode is selected) -->
          <div id="gridConfigPanel" class="hidden mt-4">
            <div
              class="rounded-xl border border-slate-800 bg-slate-900 overflow-hidden"
            >
              <div
                class="px-4 py-3 border-b border-slate-800 flex items-center justify-between"
              >
                <div class="font-medium">Grid Configuration</div>
                <div class="flex items-center gap-2">
                  <label class="text-xs text-slate-400">Layout:</label>
                  <select
                    id="gridLayoutSelect"
                    class="rounded-lg bg-slate-950 border border-slate-800 px-2 py-1 text-xs"
                  ></select>
                </div>
              </div>
              <div class="p-4">
                <div
                  id="gridSlotsContainer"
                  class="grid gap-2"
                ></div>
                <div class="mt-3 flex items-center gap-2">
                  <button
                    id="applyGridBtn"
                    class="rounded-lg bg-emerald-600 hover:bg-emerald-500 px-4 py-2 text-sm font-medium"
                  >
                    Apply Grid
                  </button>
                  <div id="gridMsg" class="text-xs text-slate-400"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="flex flex-row w-full gap-2 mt-6">
            <!-- Attendace Tracker -->
            <div
              class="rounded-xl border border-slate-800 bg-slate-900 w-[50%]"
            >
              <div class="px-4 py-3 border-b border-slate-800">
                <div class="font-medium">Attendance</div>
                <div class="text-xs text-slate-400" id="attendanceMeta">
                  Marks once per server run
                </div>
              </div>

              <div id="attendanceList" class="p-4 space-y-2"></div>
            </div>

            <!-- Upload -->
            <div
              class="rounded-xl border border-slate-800 bg-slate-900 w-[50%]"
            >
              <div class="px-4 py-3 border-b border-slate-800">
                <div class="font-medium">Add image</div>
                <div class="text-xs text-slate-400">
                  Saves as 1.jpg, 2.jpg, … in faces/&lt;person&gt;/
                </div>
              </div>

              <form
                id="uploadForm"
                class="p-4 space-y-4"
                enctype="multipart/form-data"
              >
                <div class="space-y-2">
                  <div class="text-sm text-slate-300">Person</div>
                  <div class="flex items-center gap-3">
                    <label class="flex items-center gap-2 text-sm">
                      <input
                        type="radio"
                        name="mode"
                        value="existing"
                        checked
                        class="accent-emerald-500"
                      />
                      Existing
                    </label>
                    <label class="flex items-center gap-2 text-sm">
                      <input
                        type="radio"
                        name="mode"
                        value="new"
                        class="accent-emerald-500"
                      />
                      New
                    </label>
                  </div>

                  <select
                    id="existingName"
                    name="existing_name"
                    class="w-full rounded-lg bg-slate-950 border border-slate-800 px-3 py-2 text-sm"
                  ></select>

                  <input
                    id="newName"
                    name="new_name"
                    placeholder="e.g. Ahmed_AlQahtani"
                    class="w-full rounded-lg bg-slate-950 border border-slate-800 px-3 py-2 text-sm hidden"
                  />
                  <div id="nameValidation" class="text-xs text-red-400 hidden"></div>
                  <div class="text-xs text-slate-400">
                    Folder names are sanitized (letters/numbers/_-).
                  </div>
                </div>

                <div class="space-y-2">
                  <div class="text-sm text-slate-300">Image</div>
                  <div class="flex items-center gap-2">
                    <input
                      name="file"
                      id="fileInput"
                      type="file"
                      accept="image/*"
                      required
                      class="flex-1 min-w-0 text-sm text-slate-200 file:mr-3 file:rounded-lg file:border-0 file:bg-slate-800 file:px-3 file:py-2 file:text-sm file:text-slate-100 hover:file:bg-slate-700"
                    />
                    <button
                      type="button"
                      onclick="openCaptureModal()"
                      class="shrink-0 rounded-lg bg-slate-800 hover:bg-slate-700 p-2 text-slate-300 hover:text-white transition-colors"
                      title="Take photo with camera"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                      </svg>
                    </button>
                  </div>
                </div>

                <button
                  type="submit"
                  id="uploadBtn"
                  class="w-full rounded-lg bg-emerald-600 hover:bg-emerald-500 px-3 py-2 text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  Upload
                </button>

                <!-- Progress bar (hidden by default) -->
                <div id="uploadProgress" class="hidden space-y-1">
                  <div class="w-full h-2 rounded-full bg-slate-800 overflow-hidden">
                    <div id="uploadProgressBar" class="h-full rounded-full bg-emerald-500 transition-all duration-200" style="width: 0%"></div>
                  </div>
                  <div id="uploadProgressText" class="text-xs text-slate-400 text-center">0%</div>
                </div>

                <div id="uploadMsg" class="text-xs text-slate-300"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Camera Capture Modal -->
    <div id="captureModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
      <div class="relative bg-slate-900 rounded-xl border border-slate-700 shadow-2xl p-4 max-w-lg w-full mx-4 space-y-3">
        <div class="flex items-center justify-between">
          <div class="text-sm font-medium">Take Photo</div>
          <button onclick="closeCaptureModal()" class="text-slate-400 hover:text-red-400 text-xl font-bold transition-colors">&times;</button>
        </div>
        <select id="captureDeviceSelect" onchange="switchCaptureCamera()"
          class="w-full rounded-lg bg-slate-950 border border-slate-800 px-3 py-2 text-sm">
        </select>
        <div id="captureCamMsg" class="text-xs text-yellow-400 hidden"></div>
        <div class="relative rounded-lg overflow-hidden bg-black aspect-video">
          <video id="capturePreview" autoplay playsinline
            class="w-full h-full object-cover" style="transform: scaleX(-1)"></video>
        </div>
        <canvas id="captureCanvas" class="hidden"></canvas>
        <button type="button" onclick="capturePhoto()"
          class="w-full rounded-lg bg-emerald-600 hover:bg-emerald-500 px-3 py-2 text-sm font-medium">
          Capture
        </button>
      </div>
    </div>

    <script>
      // --- DOM (guarded, since some sections may be removed) ---
      const peopleListEl = document.getElementById("peopleList");
      const peopleCountEl = document.getElementById("peopleCount");
      const existingSelect = document.getElementById("existingName");
      const newNameInput = document.getElementById("newName");
      const uploadMsg = document.getElementById("uploadMsg");
      const statusText = document.getElementById("statusText");
      const videoFeed = document.getElementById("videoFeed");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const attendanceListEl = document.getElementById("attendanceList");
      const attendanceMetaEl = document.getElementById("attendanceMeta");
      const toastContainer = document.getElementById("toastContainer");
      const qrPrompt = document.getElementById("qrPrompt");
      const singleCamBtn = document.getElementById("singleCamBtn");
      const multiCamBtn = document.getElementById("multiCamBtn");
      const singleCamDropdown = document.getElementById("singleCamDropdown");
      const multiCamDropdown = document.getElementById("multiCamDropdown");
      const singleCamList = document.getElementById("singleCamList");
      const multiCamList = document.getElementById("multiCamList");
      const cameraMsg = document.getElementById("cameraMsg");

      let currentCamMode = "single"; // "single" or "multi"
      let singleCamDevices = [];
      let multiCamLayouts = [];

      let attendanceES = null;
      let cameraRunning = false;

      // --- stream control ---
      function startStream() {
        if (!videoFeed) return;
        videoFeed.src = "/video?ts=" + Date.now(); // bust cache
      }

      function stopStream() {
        if (!videoFeed) return;
        videoFeed.removeAttribute("src");
        videoFeed.src = "";
      }

      function setRunningUI(running) {
        running = !!running;
        cameraRunning = running;

        if (statusText)
          statusText.textContent = running
            ? "Camera running"
            : "Camera stopped";

        if (startBtn) {
          startBtn.disabled = running;
          startBtn.classList.toggle("opacity-50", running);
        }
        if (stopBtn) {
          stopBtn.disabled = !running;
          stopBtn.classList.toggle("opacity-50", !running);
        }

        // Keep MJPEG aligned — always restart to pick up new camera source
        if (running) {
          if (videoFeed) startStream();
        } else {
          if (videoFeed && videoFeed.getAttribute("src")) stopStream();
        }
      }

      async function loadCameraOptions() {
        const r = await fetch("/api/camera");
        const j = await r.json();
        const devices = j.devices || [];
        const currentSource = String(j.camera_source || "");

        // Split devices into single cameras vs grid layouts
        singleCamDevices = devices.filter(d => !String(d.value || "").startsWith("grid_"));
        multiCamLayouts = devices.filter(d => String(d.value || "").startsWith("grid_"));

        // Detect current mode
        const isGrid = /^grid_\d+x\d+$/.test(currentSource);
        currentCamMode = isGrid ? "multi" : "single";

        // Render single camera list
        if (singleCamList) {
          let html = "";
          singleCamDevices.forEach(d => {
            const val = String(d.value || "");
            const active = !isGrid && val === currentSource;
            html += `<button type="button" data-source="${val}"
              class="w-full text-left px-3 py-2 text-xs hover:bg-slate-800 transition-colors flex items-center justify-between ${active ? 'bg-slate-800 text-emerald-400' : 'text-slate-300'}">
              <span>${d.label || 'Camera ' + val}</span>
              ${active ? '<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>' : ''}
            </button>`;
          });
          if (!singleCamDevices.length) {
            html = '<div class="px-3 py-2 text-xs text-slate-500">No cameras detected</div>';
          }
          singleCamList.innerHTML = html;
        }

        // Render multi camera list
        if (multiCamList) {
          let html = "";
          multiCamLayouts.forEach(d => {
            const val = String(d.value || "");
            const active = isGrid && val === currentSource;
            html += `<button type="button" data-source="${val}"
              class="w-full text-left px-3 py-2 text-xs hover:bg-slate-800 transition-colors flex items-center justify-between ${active ? 'bg-slate-800 text-emerald-400' : 'text-slate-300'}">
              <span>${d.label || val}</span>
              ${active ? '<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>' : ''}
            </button>`;
          });
          if (!multiCamLayouts.length) {
            html = '<div class="px-3 py-2 text-xs text-slate-500">No cameras for grid</div>';
          }
          multiCamList.innerHTML = html;
        }

        // Update mode button styling
        updateCamModeButtons();

        if (cameraMsg)
          cameraMsg.textContent = currentSource
            ? `Current source: ${currentSource}`
            : "Current source: (not set)";

        // Show/hide grid panel based on current source
        if (typeof updateGridPanelVisibility === "function") {
          updateGridPanelVisibility();
        }
      }

      function updateCamModeButtons() {
        const onClasses = ["bg-emerald-600", "hover:bg-emerald-500", "text-white"];
        const offClasses = ["bg-slate-800", "hover:bg-slate-700"];
        [singleCamBtn, multiCamBtn].forEach((btn, i) => {
          if (!btn) return;
          const isActive = (i === 0 && currentCamMode === "single") || (i === 1 && currentCamMode === "multi");
          onClasses.forEach(c => btn.classList.toggle(c, isActive));
          offClasses.forEach(c => btn.classList.toggle(c, !isActive));
        });
      }

      function closeAllDropdowns() {
        if (singleCamDropdown) singleCamDropdown.classList.add("hidden");
        if (multiCamDropdown) multiCamDropdown.classList.add("hidden");
      }

      async function switchCamera(source) {
        closeAllDropdowns();
        if (cameraMsg) cameraMsg.textContent = "Switching...";
        try {
          const r = await fetch("/api/camera", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ source, restart: cameraRunning }),
          });
          const j = await r.json();
          if (!r.ok || !j.ok) {
            if (cameraMsg) cameraMsg.textContent = `Switch failed: ${j.error || "unknown error"}`;
            return;
          }
          if (cameraMsg) cameraMsg.textContent = `Current source: ${j.camera_source}`;
          await loadCameraOptions();
          if (j.running && videoFeed) startStream();
          toast(`Camera source set to ${j.camera_source}`, "success");
        } catch (e) {
          if (cameraMsg) cameraMsg.textContent = `Switch failed: ${String(e)}`;
        }
      }

      function renderAttendance(roster) {
        if (!attendanceListEl) return;
        roster = roster || [];

        const attendedCount = roster.filter((r) => r.attended).length;
        if (attendanceMetaEl)
          attendanceMetaEl.textContent = `${attendedCount}/${roster.length} attended`;

        attendanceListEl.innerHTML = roster.length
          ? roster.map(renderAttendanceRow).join("")
          : `<div class="text-sm text-slate-400">No people loaded.</div>`;
      }

      function connectAttendanceStream() {
        if (attendanceES) return;

        attendanceES = new EventSource("/api/attendance/stream");

        attendanceES.addEventListener("state", (e) => {
          const j = JSON.parse(e.data);
          setRunningUI(!!j.running);
          renderAttendance(j.attendance || []);
          setQrPromptVisible(!!j.qr_prompt);
        });

        attendanceES.addEventListener("new", (e) => {
          const ev = JSON.parse(e.data);
          toast(`✅ Marked attendance: ${ev.name}`, "success");
        });

        attendanceES.addEventListener("repeat", (e) => {
          const ev = JSON.parse(e.data);
          toast(`ℹ️ ${ev.name} has already attended`, "warn");
        });

        attendanceES.onerror = () => {
          // Browser auto-reconnects. Optional: show “reconnecting…”
        };

      }

      window.addEventListener("beforeunload", () => {
        if (attendanceES) attendanceES.close();
        attendanceES = null;
      });

      // Call once on startup:
      connectAttendanceStream();
      function setQrPromptVisible(v) {
        if (!qrPrompt) return;
        qrPrompt.classList.toggle("hidden", !v);
      }

      // --- toast ---
      function toast(message, kind = "info") {
        if (!toastContainer) return;

        const el = document.createElement("div");
        el.className =
          "rounded-lg border border-slate-700 bg-slate-900/95 px-3 py-2 text-sm shadow-lg";

        if (kind === "success") el.classList.add("border-emerald-700");
        if (kind === "warn") el.classList.add("border-amber-700");

        el.textContent = message;
        toastContainer.appendChild(el);

        setTimeout(() => {
          el.classList.add("opacity-0");
          setTimeout(() => el.remove(), 250);
        }, 2500);
      }

      function fmtTime(ts) {
        if (!ts) return "—";
        try {
          return new Date(ts * 1000).toLocaleTimeString();
        } catch {
          return "—";
        }
      }

      function renderAttendanceRow(p) {
        const val = p.attended ? "true" : "false";
        const cls = p.attended ? "text-emerald-300" : "text-slate-400";

        return `
    <div class="flex items-center justify-between rounded-lg border border-slate-800 bg-slate-950 px-3 py-2">
      <div class="text-sm font-medium">${p.name}</div>
      <div class="text-xs font-mono ${cls}">${val}</div>
    </div>
  `;
      }

      // --- Mode UI for upload ---
      function currentMode() {
        return (
          document.querySelector('input[name="mode"]:checked')?.value ||
          "existing"
        );
      }

      function setModeUI() {
        const mode = currentMode();
        if (!newNameInput || !existingSelect) return;

        if (mode === "new") {
          newNameInput.classList.remove("hidden");
          existingSelect.classList.add("hidden");
        } else {
          newNameInput.classList.add("hidden");
          existingSelect.classList.remove("hidden");
        }
      }

      document.querySelectorAll('input[name="mode"]').forEach((r) => {
        r.addEventListener("change", () => { setModeUI(); validateNewName(); });
      });

      // --- New name duplicate validation ---
      const nameValidation = document.getElementById("nameValidation");

      function sanitizeName(raw) {
        return raw.trim().replace(/ /g, "_").replace(/[^A-Za-z0-9_\-]/g, "").slice(0, 64);
      }

      function validateNewName() {
        if (!nameValidation) return true;
        if (currentMode() !== "new") {
          nameValidation.classList.add("hidden");
          return true;
        }
        const sanitized = sanitizeName(newNameInput.value);
        if (sanitized && _knownPeopleNames.includes(sanitized.toLowerCase())) {
          nameValidation.textContent = `"${sanitized}" already exists. Use "Existing" to add more images.`;
          nameValidation.classList.remove("hidden");
          return false;
        }
        nameValidation.classList.add("hidden");
        return true;
      }

      if (newNameInput) {
        newNameInput.addEventListener("input", validateNewName);
      }

      // --- People list (for dropdown; grid section can be removed safely) ---
      let _knownPeopleNames = [];

      async function refreshPeople() {
        const r = await fetch("/api/people");
        const j = await r.json();
        const people = j.people || [];
        _knownPeopleNames = people.map(p => p.name.toLowerCase());

        if (peopleCountEl) peopleCountEl.textContent = `${people.length} total`;
        if (peopleListEl) {
          // If you remove the People grid section, this element may not exist — guarded.
          // (No-op if missing.)
        }

        if (existingSelect) {
          existingSelect.innerHTML = people.length
            ? people
                .map(
                  (p) =>
                    `<option value="${p.name}">${p.name} (${p.count})</option>`,
                )
                .join("")
            : `<option value="">(no people yet)</option>`;
        }
      }

      // --- Buttons ---
      startBtn.onclick = async () => {
        await fetch("/api/start", { method: "POST" });
        // UI/stream will be aligned by SSE "state" event
      };

      stopBtn.onclick = async () => {
        await fetch("/api/stop", { method: "POST" });
        stopStream(); // close MJPEG immediately client-side
      };

      // --- Single / Multi cam mode buttons ---
      if (singleCamBtn) {
        singleCamBtn.onclick = () => {
          const wasOpen = !singleCamDropdown.classList.contains("hidden");
          closeAllDropdowns();
          if (!wasOpen) singleCamDropdown.classList.remove("hidden");
        };
      }
      if (multiCamBtn) {
        multiCamBtn.onclick = () => {
          const wasOpen = !multiCamDropdown.classList.contains("hidden");
          closeAllDropdowns();
          if (!wasOpen) multiCamDropdown.classList.remove("hidden");
        };
      }

      // Delegate clicks within dropdown lists
      if (singleCamList) {
        singleCamList.onclick = (e) => {
          const btn = e.target.closest("[data-source]");
          if (btn) switchCamera(btn.dataset.source);
        };
      }
      if (multiCamList) {
        multiCamList.onclick = (e) => {
          const btn = e.target.closest("[data-source]");
          if (btn) switchCamera(btn.dataset.source);
        };
      }

      // Close dropdowns on outside click
      document.addEventListener("click", (e) => {
        const group = document.getElementById("camModeGroup");
        if (group && !group.contains(e.target)) closeAllDropdowns();
      });

      // --- Grid configurator ---
      const gridConfigPanel = document.getElementById("gridConfigPanel");
      const gridLayoutSelect = document.getElementById("gridLayoutSelect");
      const gridSlotsContainer = document.getElementById("gridSlotsContainer");
      const applyGridBtn = document.getElementById("applyGridBtn");
      const gridMsg = document.getElementById("gridMsg");

      let gridAvailableCameras = [];
      let gridCurrentLayout = [2, 2];
      let gridSlots = {};

      function showGridPanel(show) {
        if (gridConfigPanel) {
          gridConfigPanel.classList.toggle("hidden", !show);
        }
      }

      async function loadGridConfig() {
        try {
          const r = await fetch("/api/grid/config");
          const j = await r.json();
          gridAvailableCameras = j.available_cameras || [];
          gridCurrentLayout = j.layout || [2, 2];
          gridSlots = j.slots || {};

          // Populate layout selector
          if (gridLayoutSelect) {
            const layouts = j.available_layouts || [];
            gridLayoutSelect.innerHTML = layouts
              .map(
                ([r, c]) =>
                  `<option value="${r}x${c}" ${
                    r === gridCurrentLayout[0] && c === gridCurrentLayout[1]
                      ? "selected"
                      : ""
                  }>${r}x${c} (${r * c} slots)</option>`,
              )
              .join("");
          }
          renderGridSlots();
        } catch (e) {
          console.error("Failed to load grid config:", e);
        }
      }

      // Helper: get the camera source from a slot value (object or null)
      function slotSource(slot) {
        if (!slot) return "";
        if (typeof slot === "object") return slot.source || "";
        return String(slot);
      }
      function slotName(slot) {
        if (!slot) return "";
        if (typeof slot === "object") return slot.name || "";
        return "";
      }

      function renderGridSlots() {
        if (!gridSlotsContainer) return;
        const [rows, cols] = gridCurrentLayout;
        const totalSlots = rows * cols;

        gridSlotsContainer.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        gridSlotsContainer.innerHTML = "";

        for (let i = 0; i < totalSlots; i++) {
          const slotVal = gridSlots[String(i)];
          const currentSource = slotSource(slotVal);
          const currentName = slotName(slotVal);

          const cell = document.createElement("div");
          cell.className =
            "rounded-lg border border-slate-700 bg-slate-950 p-2 space-y-1";

          const label = document.createElement("div");
          label.className = "text-xs text-slate-400 mb-1";
          label.textContent = `Slot ${i + 1}`;
          cell.appendChild(label);

          // Camera select
          const select = document.createElement("select");
          select.className =
            "w-full rounded bg-slate-900 border border-slate-700 px-2 py-1 text-xs";
          select.dataset.slot = String(i);

          let html = `<option value="">Empty</option>`;
          gridAvailableCameras.forEach((cam) => {
            const usedElsewhere = Object.entries(gridSlots).some(
              ([k, v]) => k !== String(i) && slotSource(v) === cam.value,
            );
            const selected = currentSource === cam.value ? "selected" : "";
            const disabled = usedElsewhere && !selected ? "disabled" : "";
            html += `<option value="${cam.value}" ${selected} ${disabled}>${cam.label}${usedElsewhere && !selected ? " (in use)" : ""}</option>`;
          });
          select.innerHTML = html;
          select.addEventListener("change", (e) => {
            const slot = e.target.dataset.slot;
            const val = e.target.value;
            if (val) {
              const existing = gridSlots[slot];
              gridSlots[slot] = { source: val, name: slotName(existing) || `Camera ${val}` };
            } else {
              gridSlots[slot] = null;
            }
            renderGridSlots();
          });
          cell.appendChild(select);

          // Location name input (only shown if a camera is selected)
          if (currentSource) {
            const nameInput = document.createElement("input");
            nameInput.type = "text";
            nameInput.placeholder = "Location name";
            nameInput.value = currentName;
            nameInput.className =
              "w-full rounded bg-slate-900 border border-slate-700 px-2 py-1 text-xs mt-1";
            nameInput.dataset.slot = String(i);
            nameInput.addEventListener("input", (e) => {
              const slot = e.target.dataset.slot;
              const existing = gridSlots[slot];
              if (existing && typeof existing === "object") {
                existing.name = e.target.value;
              }
            });
            cell.appendChild(nameInput);
          }

          gridSlotsContainer.appendChild(cell);
        }
      }

      if (gridLayoutSelect) {
        gridLayoutSelect.addEventListener("change", (e) => {
          const parts = e.target.value.split("x");
          const newRows = parseInt(parts[0], 10);
          const newCols = parseInt(parts[1], 10);
          const oldTotal = gridCurrentLayout[0] * gridCurrentLayout[1];
          const newTotal = newRows * newCols;

          gridCurrentLayout = [newRows, newCols];

          // Preserve existing assignments, trim or pad
          const newSlots = {};
          for (let i = 0; i < newTotal; i++) {
            newSlots[String(i)] =
              i < oldTotal ? gridSlots[String(i)] || null : null;
          }
          gridSlots = newSlots;
          renderGridSlots();
        });
      }

      if (applyGridBtn) {
        applyGridBtn.addEventListener("click", async () => {
          // Client-side duplicate check (compare source values)
          const sources = Object.values(gridSlots)
            .map((v) => slotSource(v))
            .filter((s) => s);
          const seen = new Set();
          const dupes = new Set();
          sources.forEach((s) => {
            if (seen.has(s)) dupes.add(s);
            seen.add(s);
          });
          if (dupes.size > 0) {
            if (gridMsg)
              gridMsg.textContent = `Each camera can only be assigned to one slot.`;
            return;
          }

          applyGridBtn.disabled = true;
          if (gridMsg) gridMsg.textContent = "Applying...";

          try {
            const r = await fetch("/api/grid/config", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                layout: gridCurrentLayout,
                slots: gridSlots,
              }),
            });
            const j = await r.json();
            if (!r.ok || !j.ok) {
              if (gridMsg)
                gridMsg.textContent = `Error: ${j.error || "unknown error"}`;
              return;
            }
            if (gridMsg) gridMsg.textContent = "Grid applied.";
            if (cameraMsg)
              cameraMsg.textContent = `Current source: ${j.camera_source}`;
            toast("Grid configuration applied", "success");
            await loadCameraOptions();
            // Force-restart stream so we don't wait for SSE to notice
            if (j.running && videoFeed) startStream();
          } catch (e) {
            if (gridMsg) gridMsg.textContent = `Error: ${String(e)}`;
          } finally {
            applyGridBtn.disabled = false;
          }
        });
      }

      // Show/hide grid panel based on current mode
      function updateGridPanelVisibility() {
        const shouldShow = currentCamMode === "multi";
        showGridPanel(shouldShow);
        if (shouldShow) {
          loadGridConfig();
        }
      }

      // --- Reload faces ---
      const reloadBtn = document.getElementById("reloadBtn");
      if (reloadBtn) {
        reloadBtn.onclick = async () => {
          await fetch("/api/reload_faces", { method: "POST" });
          await refreshPeople();
          if (uploadMsg) uploadMsg.textContent = "Reloaded.";
        };
      }

      // --- Upload ---
      const uploadForm = document.getElementById("uploadForm");
      const uploadBtn = document.getElementById("uploadBtn");
      const uploadProgress = document.getElementById("uploadProgress");
      const uploadProgressBar = document.getElementById("uploadProgressBar");
      const uploadProgressText = document.getElementById("uploadProgressText");

      function _setProgress(pct) {
        if (!uploadProgress || !uploadProgressBar || !uploadProgressText) return;
        uploadProgress.classList.remove("hidden");
        uploadProgressBar.style.width = pct + "%";
        uploadProgressText.textContent = pct < 100 ? pct + "%" : "Processing...";
      }

      function _hideProgress() {
        if (uploadProgress) uploadProgress.classList.add("hidden");
        if (uploadProgressBar) uploadProgressBar.style.width = "0%";
        if (uploadProgressText) uploadProgressText.textContent = "0%";
      }

      function _setUploading(busy) {
        if (uploadBtn) {
          uploadBtn.disabled = busy;
          uploadBtn.textContent = busy ? "Uploading..." : "Upload";
        }
      }

      if (uploadForm) {
        uploadForm.onsubmit = async (e) => {
          e.preventDefault();
          if (!validateNewName()) {
            if (uploadMsg) uploadMsg.textContent = "Fix the name error above first.";
            return;
          }

          const fd = new FormData(e.target);
          fd.set("mode", currentMode());

          // Clear previous messages
          if (uploadMsg) { uploadMsg.textContent = ""; uploadMsg.className = "text-xs text-slate-300"; }
          _setUploading(true);
          _setProgress(0);

          // Use XMLHttpRequest for upload progress tracking
          const xhr = new XMLHttpRequest();

          xhr.upload.addEventListener("progress", (ev) => {
            if (ev.lengthComputable) {
              const pct = Math.round((ev.loaded / ev.total) * 100);
              _setProgress(pct);
            }
          });

          xhr.addEventListener("load", async () => {
            _hideProgress();
            _setUploading(false);

            let j;
            try { j = JSON.parse(xhr.responseText); } catch { j = {}; }

            if (xhr.status < 200 || xhr.status >= 300) {
              if (uploadMsg) {
                uploadMsg.textContent = "Error: " + (j.error || "upload failed");
                uploadMsg.className = "text-xs text-red-400";
              }
              return;
            }

            // Success — show inline confirmation + toast
            if (uploadMsg) {
              uploadMsg.innerHTML =
                '<span class="inline-flex items-center gap-1 text-emerald-400">' +
                '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">' +
                '<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' +
                'Saved to ' + (j.person || '') + '/</span>';
              uploadMsg.className = "text-xs";
            }
            toast("Face image uploaded to " + (j.person || "folder"), "success");

            // Refresh people list after successful upload
            await refreshPeople();

            // Reset form: clear file input, name, and radio buttons
            uploadForm.reset();
            setModeUI();
            if (nameValidation) nameValidation.classList.add("hidden");

            // Clear the success message after a few seconds
            setTimeout(() => {
              if (uploadMsg) { uploadMsg.textContent = ""; uploadMsg.className = "text-xs text-slate-300"; }
            }, 4000);
          });

          xhr.addEventListener("error", () => {
            _hideProgress();
            _setUploading(false);
            if (uploadMsg) {
              uploadMsg.textContent = "Network error — check your connection.";
              uploadMsg.className = "text-xs text-red-400";
            }
          });

          xhr.addEventListener("abort", () => {
            _hideProgress();
            _setUploading(false);
            if (uploadMsg) { uploadMsg.textContent = "Upload cancelled."; uploadMsg.className = "text-xs text-slate-300"; }
          });

          xhr.open("POST", "/api/upload_face");
          xhr.send(fd);
        };
      }

      // --- Camera Capture ---
      let _captureStream = null;
      let _engineCamIndices = [];   // camera indices currently held by the engine

      async function _fetchEngineCameras() {
        // Ask the backend which camera indices the engine currently holds open
        try {
          const r = await fetch('/api/camera');
          const j = await r.json();
          _engineCamIndices = (j.running && Array.isArray(j.active_cameras))
            ? j.active_cameras : [];
        } catch (_) {
          _engineCamIndices = [];
        }
      }

      function _cameraErrorMessage(err) {
        const name = err.name || '';
        if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
          return 'Camera permission denied. Please allow camera access in your browser.';
        }
        if (name === 'NotReadableError' || name === 'AbortError' || name === 'TrackStartError') {
          return 'Camera is in use by another application (possibly the recognition engine). Try a different camera or stop the engine first.';
        }
        if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
          return 'No camera found on this device.';
        }
        if (name === 'OverconstrainedError') {
          return 'Camera does not support the requested resolution.';
        }
        return 'Could not open camera: ' + (err.message || name);
      }

      async function openCaptureModal() {
        const modal = document.getElementById('captureModal');
        const select = document.getElementById('captureDeviceSelect');
        const camMsg = document.getElementById('captureCamMsg');
        if (camMsg) { camMsg.textContent = ''; camMsg.classList.add('hidden'); }
        modal.classList.remove('hidden');

        // Fetch engine camera info in parallel with permission probe
        const engineProm = _fetchEngineCameras();

        // Request permission first so device labels are available
        try {
          const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
          tempStream.getTracks().forEach(t => t.stop());
        } catch (err) {
          console.warn('Camera probe failed:', err);
          closeCaptureModal();
          if (uploadMsg) uploadMsg.textContent = _cameraErrorMessage(err);
          return;
        }

        await engineProm;

        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter(d => d.kind === 'videoinput');

        select.innerHTML = cameras.map((d, i) => {
          const label = d.label || 'Camera ' + i;
          // Try to detect if this is one of the engine's cameras by matching the index in the label
          const idxMatch = label.match(/\b(\d+)\b/);
          const inUse = idxMatch && _engineCamIndices.includes(parseInt(idxMatch[1]));
          const suffix = inUse ? ' (in use by engine)' : '';
          return `<option value="${d.deviceId}">${label}${suffix}</option>`;
        }).join('');

        if (_engineCamIndices.length > 0 && camMsg) {
          camMsg.textContent = 'Note: The recognition engine is using camera ' +
            _engineCamIndices.join(', ') + '. If a camera fails to open, try a different one or stop the engine first.';
          camMsg.classList.remove('hidden');
        }

        if (cameras.length > 0) {
          await switchCaptureCamera();
        }
      }

      async function switchCaptureCamera() {
        if (_captureStream) {
          _captureStream.getTracks().forEach(t => t.stop());
          _captureStream = null;
        }

        const select = document.getElementById('captureDeviceSelect');
        const video = document.getElementById('capturePreview');
        const camMsg = document.getElementById('captureCamMsg');
        const deviceId = select.value;
        if (!deviceId) return;

        try {
          _captureStream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } }
          });
          video.srcObject = _captureStream;
          // Clear any previous per-camera error (keep the engine-note if present)
        } catch (err) {
          console.error('Camera error:', err);
          video.srcObject = null;
          if (camMsg) {
            camMsg.textContent = _cameraErrorMessage(err);
            camMsg.classList.remove('hidden');
          }
        }
      }

      function capturePhoto() {
        const video = document.getElementById('capturePreview');
        const canvas = document.getElementById('captureCanvas');
        const fileInput = document.getElementById('fileInput');

        if (!video.videoWidth) return;

        // Draw unmirrored frame to canvas
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);

        canvas.toBlob((blob) => {
          if (!blob) return;
          const file = new File([blob], 'capture.jpg', { type: 'image/jpeg' });
          const dt = new DataTransfer();
          dt.items.add(file);
          fileInput.files = dt.files;

          closeCaptureModal();
          if (uploadMsg) uploadMsg.textContent = 'Photo captured. Click Upload to save.';
        }, 'image/jpeg', 0.92);
      }

      function closeCaptureModal() {
        if (_captureStream) {
          _captureStream.getTracks().forEach(t => t.stop());
          _captureStream = null;
        }
        const modal = document.getElementById('captureModal');
        const video = document.getElementById('capturePreview');
        video.srcObject = null;
        modal.classList.add('hidden');
      }

      // --- initial ---
      setModeUI();
      loadCameraOptions();
      refreshPeople();
    </script>
  </body>
</html>
